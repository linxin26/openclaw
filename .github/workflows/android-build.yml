name: Android Build

on:
  # 推送到 v2026.3.13-1 标签时自动触发
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  # 允许手动触发（最重要）
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. 设置 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      # 3. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      # 4. 缓存 Gradle
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # 5. 进入 Android 目录并赋予执行权限
      - name: Prepare Gradle
        working-directory: ./apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew --version
      
      # 6. 编译 Debug APK
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        working-directory: ./apps/android
        run: ./gradlew :app:assembleDebug --stacktrace
      
      # 7. 编译 Release APK（需要签名）
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        working-directory: ./apps/android
        run: ./gradlew :app:assembleRelease --stacktrace
      
      # 8. 上传 Debug APK 产物
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-debug
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      # 9. 上传 Release APK 产物
      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-release
          path: apps/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
      
      # 10. 显示构建信息
      - name: Display build info
        run: |
          echo "Build completed at ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          ls -la apps/android/app/build/outputs/apk/*/ || true
